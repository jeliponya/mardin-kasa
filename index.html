<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mardin Kasa Defteri</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --accent: #e8b84b;
    --accent2: #e05c3a;
    --green: #4caf82;
    --text: #f0ece0;
    --muted: #888;
    --input-bg: #242424;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 4px;
    color: var(--accent);
    line-height: 1;
  }

  header h1 span {
    color: var(--text);
    font-size: 1rem;
    letter-spacing: 2px;
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 4px;
  }

  .date-row { display: flex; align-items: center; gap: 10px; }
  .date-row label { color: var(--muted); font-size: 0.8rem; letter-spacing: 1px; }
  .date-row input[type="date"] {
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.95rem;
    padding: 6px 12px;
    border-radius: 4px;
    outline: none;
  }
  .date-row input[type="date"]:focus { border-color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .panel-header {
    padding: 12px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-header.gelen { background: rgba(76,175,130,0.12); color: var(--green); border-bottom: 1px solid rgba(76,175,130,0.25); }
  .panel-header.giden { background: rgba(224,92,58,0.12); color: var(--accent2); border-bottom: 1px solid rgba(224,92,58,0.25); }

  .entry-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .entry-row { display: flex; align-items: center; gap: 8px; }

  .entry-label {
    width: 90px;
    font-size: 0.75rem;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .entry-row input[type="number"] {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.95rem;
    padding: 7px 10px;
    border-radius: 4px;
    outline: none;
    text-align: right;
    transition: border-color 0.15s;
  }
  .entry-row input[type="number"]:focus { border-color: var(--accent); }
  .entry-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .entry-row .currency { font-size: 0.8rem; color: var(--muted); width: 16px; text-align: right; flex-shrink: 0; }

  .diger-row { display: flex; align-items: center; gap: 8px; }
  .diger-row input[type="text"] {
    width: 90px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.75rem;
    padding: 7px 8px;
    border-radius: 4px;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .diger-row input[type="text"]:focus { border-color: var(--accent); color: var(--text); }
  .diger-row input[type="text"]::placeholder { color: #555; }
  .diger-row input[type="number"] {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.95rem;
    padding: 7px 10px;
    border-radius: 4px;
    outline: none;
    text-align: right;
  }
  .diger-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .diger-row input[type="number"]:focus { border-color: var(--accent); }

  .add-btn {
    background: #1e3a1e;
    border: 1.5px solid #4a9e4a;
    color: #7ddf7d;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    padding: 7px 12px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 4px;
    letter-spacing: 1.5px;
    width: 100%;
    text-transform: uppercase;
  }
  .add-btn:hover { background: #274f27; border-color: #7ddf7d; }

  .panel-total {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-total .label { font-size: 0.75rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .panel-total .val { font-family: 'IBM Plex Mono', monospace; font-size: 1.05rem; font-weight: 600; }
  .panel-total .val.gelen { color: var(--green); }
  .panel-total .val.giden { color: var(--accent2); }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
  }
  .result-item { text-align: center; }
  .result-item .rlabel { font-size: 0.7rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .result-item .rval { font-family: 'IBM Plex Mono', monospace; font-size: 1.35rem; font-weight: 600; }
  .rval.green { color: var(--green); }
  .rval.red { color: var(--accent2); }
  .rval.gold { color: var(--accent); }

  .divider { width: 1px; height: 40px; background: var(--border); }

  .note-row {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .note-row label { color: var(--muted); font-size: 0.75rem; letter-spacing: 1px; padding-top: 8px; white-space: nowrap; }
  .note-row textarea {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.9rem;
    padding: 8px 12px;
    border-radius: 4px;
    resize: vertical;
    outline: none;
    min-height: 52px;
    line-height: 1.5;
  }
  .note-row textarea:focus { border-color: var(--accent); }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 1.5px;
    padding: 9px 22px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
  }
  .btn-danger {
    background: #3a1010;
    border: 1.5px solid var(--accent2);
    color: var(--accent2);
  }
  .btn-danger:hover { background: var(--accent2); color: #fff; }

  .btn-mail {
    background: #0e2233;
    border: 1.5px solid #4a9ec8;
    color: #7dcfee;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 1.5px;
    padding: 9px 22px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
  }
  .btn-mail:hover { background: #163348; border-color: #7dcfee; }

  .btn-primary {
    background: var(--accent);
    color: #111;
    border: 1.5px solid var(--accent);
  }
  .btn-primary:hover { background: #f5c84e; border-color: #f5c84e; }

  .delete-btn {
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 1rem;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
  }
  .delete-btn:hover { color: var(--accent2); }

  /* ========== PRINT ========== */
  @media print {
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    body {
      background: #ffffff !important;
      color: #111111 !important;
      padding: 16px !important;
    }

    header { border-bottom: 2px solid #b8902a !important; margin-bottom: 20px !important; }
    header h1 { color: #b8902a !important; font-size: 2rem !important; }
    header h1 span { color: #333 !important; }

    .date-row input[type="date"] {
      background: #f5f5f5 !important;
      border: 1px solid #bbb !important;
      color: #111 !important;
    }

    .panel { background: #ffffff !important; border: 1.5px solid #bbb !important; break-inside: avoid; }

    .panel-header.gelen {
      background: #e0f5ec !important;
      color: #1e6b45 !important;
      border-bottom: 1px solid #a5d6bc !important;
    }
    .panel-header.giden {
      background: #fdecea !important;
      color: #b03020 !important;
      border-bottom: 1px solid #f0b3ad !important;
    }

    .entry-label { color: #444 !important; }

    .entry-row input[type="number"],
    .diger-row input[type="number"],
    .diger-row input[type="text"] {
      background: #f4f4f4 !important;
      border: 1px solid #ccc !important;
      color: #111111 !important;
      font-weight: 700 !important;
    }

    .entry-row .currency,
    .diger-row span { color: #444 !important; }

    .panel-total { background: #f0f0f0 !important; border-top: 1.5px solid #bbb !important; }
    .panel-total .label { color: #444 !important; }
    .panel-total .val.gelen { color: #1e6b45 !important; }
    .panel-total .val.giden { color: #b03020 !important; }

    .result-card { background: #f7f7f7 !important; border: 1.5px solid #bbb !important; }
    .result-item .rlabel { color: #444 !important; }
    .rval.green { color: #1e6b45 !important; }
    .rval.red { color: #b03020 !important; }
    .rval.gold { color: #b8902a !important; }

    .note-row label { color: #444 !important; }
    .note-row textarea {
      background: #f4f4f4 !important;
      border: 1px solid #ccc !important;
      color: #111111 !important;
    }

    .divider { background: #bbb !important; }

    .btn, .btn-mail, .add-btn, .delete-btn, .action-row { display: none !important; }
  }
</style>
</head>
<body>

<header>
  <h1><span>MARDİN ASPİLİÇ</span>KASA DEFTERİ</h1>
  <div class="date-row">
    <label>TARİH</label>
    <input type="date" id="tarih">
  </div>
</header>

<div class="grid">
  <div class="panel">
    <div class="panel-header gelen">▲ GELEN PARA</div>
    <div class="entry-list">
      <div class="entry-row">
        <span class="entry-label">KIZILTEPE</span>
        <span class="currency">₺</span>
        <input type="number" class="gelen-input" placeholder="0" min="0" step="0.01">
      </div>
      <div class="entry-row">
        <span class="entry-label">NUSAYBİN</span>
        <span class="currency">₺</span>
        <input type="number" class="gelen-input" placeholder="0" min="0" step="0.01">
      </div>
      <div class="entry-row">
        <span class="entry-label">DEPO</span>
        <span class="currency">₺</span>
        <input type="number" class="gelen-input" placeholder="0" min="0" step="0.01">
      </div>
      <div id="gelen-diger-rows"></div>
      <button class="add-btn" onclick="addRow('gelen')">+ Kalem Ekle</button>
    </div>
    <div class="panel-total">
      <span class="label">TOPLAM GELİR</span>
      <span class="val gelen" id="toplam-gelen">₺ 0,00</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header giden">▼ GİDEN PARA</div>
    <div class="entry-list">
      <div class="entry-row">
        <span class="entry-label">YEMEK</span>
        <span class="currency">₺</span>
        <input type="number" class="giden-input" placeholder="0" min="0" step="0.01">
      </div>
      <div class="entry-row">
        <span class="entry-label">TABLA</span>
        <span class="currency">₺</span>
        <input type="number" class="giden-input" placeholder="0" min="0" step="0.01">
      </div>
      <div class="entry-row">
        <span class="entry-label">MASRAF</span>
        <span class="currency">₺</span>
        <input type="number" class="giden-input" placeholder="0" min="0" step="0.01">
      </div>
      <div id="giden-diger-rows"></div>
      <button class="add-btn" onclick="addRow('giden')">+ Kalem Ekle</button>
    </div>
    <div class="panel-total">
      <span class="label">TOPLAM GİDER</span>
      <span class="val giden" id="toplam-giden">₺ 0,00</span>
    </div>
  </div>
</div>

<div class="result-card">
  <div class="result-item">
    <div class="rlabel">Toplam Gelen</div>
    <div class="rval green" id="res-gelen">₺ 0,00</div>
  </div>
  <div class="divider"></div>
  <div class="result-item">
    <div class="rlabel">Toplam Giden</div>
    <div class="rval red" id="res-giden">₺ 0,00</div>
  </div>
  <div class="divider"></div>
  <div class="result-item">
    <div class="rlabel">Kasadaki Para</div>
    <div class="rval gold" id="res-kalan">₺ 0,00</div>
  </div>
</div>

<div class="note-row">
  <label>NOT</label>
  <textarea id="aciklama" placeholder="Açıklama veya not..."></textarea>
</div>

<div class="action-row">
  <button class="btn btn-danger" onclick="temizle()">Temizle</button>
  <button class="btn-mail" onclick="mailGonder()">✉ Mail Gönder</button>
  <button class="btn btn-primary" onclick="yazdir()">Yazdır / PDF</button>
</div>

<script>
  const tarihInput = document.getElementById('tarih');
  const today = new Date();
  tarihInput.value = today.toISOString().split('T')[0];

  let gelenDigerCount = 0, gidenDigerCount = 0;
  let _gelen = 0, _giden = 0, _kalan = 0;

  function fmt(n) {
    return '₺ ' + n.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtSade(n) {
    return n.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  const notEl = document.getElementById('aciklama');
  let kullaniciNot = false;

  notEl.addEventListener('input', function() {
    kullaniciNot = true;
  });

  function hesapla() {
    _gelen = 0;
    document.querySelectorAll('.gelen-input').forEach(i => { _gelen += parseFloat(i.value) || 0; });
    _giden = 0;
    document.querySelectorAll('.giden-input').forEach(i => { _giden += parseFloat(i.value) || 0; });
    _kalan = _gelen - _giden;

    document.getElementById('toplam-gelen').textContent = fmt(_gelen);
    document.getElementById('toplam-giden').textContent = fmt(_giden);
    document.getElementById('res-gelen').textContent = fmt(_gelen);
    document.getElementById('res-giden').textContent = fmt(_giden);

    const resKalan = document.getElementById('res-kalan');
    resKalan.textContent = fmt(_kalan);
    resKalan.className = 'rval ' + (_kalan >= 0 ? 'gold' : 'red');

    // Not boşsa veya kullanıcı elle yazmadıysa otomatik güncelle
    if (!kullaniciNot) {
      notEl.value = 'Şuan kasada ' + fmtSade(_kalan) + ' TL var.';
    }
  }

  document.querySelectorAll('input').forEach(el => el.addEventListener('input', hesapla));

  function addRow(tip) {
    const container = document.getElementById(tip + '-diger-rows');
    const id = tip + '-diger-' + (tip === 'gelen' ? ++gelenDigerCount : ++gidenDigerCount);
    const div = document.createElement('div');
    div.className = 'diger-row';
    div.id = id;
    div.innerHTML = `
      <input type="text" placeholder="Açıklama" style="width:90px;flex-shrink:0;background:#242424;border:1px solid #2e2e2e;color:#888;font-size:.75rem;padding:7px 8px;border-radius:4px;outline:none;text-transform:uppercase;letter-spacing:1px;">
      <span style="color:#888;font-size:.8rem;flex-shrink:0;">₺</span>
      <input type="number" class="${tip}-input" placeholder="0" min="0" step="0.01" style="flex:1;background:#242424;border:1px solid #2e2e2e;color:#f0ece0;font-family:'IBM Plex Mono',monospace;font-size:.95rem;padding:7px 10px;border-radius:4px;outline:none;text-align:right;">
      <button class="delete-btn" onclick="removeRow('${id}')">✕</button>
    `;
    container.appendChild(div);
    div.querySelectorAll('input').forEach(el => el.addEventListener('input', hesapla));
  }

  function removeRow(id) {
    const el = document.getElementById(id);
    if (el) { el.remove(); hesapla(); }
  }

  function temizle() {
    if (!confirm('Tüm girişler silinecek. Emin misiniz?')) return;
    document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
    notEl.value = '';
    kullaniciNot = false;
    document.getElementById('gelen-diger-rows').innerHTML = '';
    document.getElementById('giden-diger-rows').innerHTML = '';
    gelenDigerCount = 0; gidenDigerCount = 0;
    hesapla();
  }

  function mailGonder() {
   
    const tarihRaw = document.getElementById('tarih').value;
    const tarih = tarihFormatla(tarihRaw);

    const gelenKalemler = [];
    document.querySelectorAll('.gelen-input').forEach(inp => {
      const val = parseFloat(inp.value) || 0;
      if (!val) return;
      const row = inp.closest('.entry-row, .diger-row');
      const labelEl = row && row.querySelector('.entry-label');
      const textEl = row && row.querySelector('input[type="text"]');
      const label = labelEl ? labelEl.textContent.trim() : (textEl && textEl.value ? textEl.value : 'Diğer');
      gelenKalemler.push('  ' + label + ': ' + fmtSade(val) + ' TL');
    });

    const gidenKalemler = [];
    document.querySelectorAll('.giden-input').forEach(inp => {
      const val = parseFloat(inp.value) || 0;
      if (!val) return;
      const row = inp.closest('.entry-row, .diger-row');
      const labelEl = row && row.querySelector('.entry-label');
      const textEl = row && row.querySelector('input[type="text"]');
      const label = labelEl ? labelEl.textContent.trim() : (textEl && textEl.value ? textEl.value : 'Diğer');
      gidenKalemler.push('  ' + label + ': ' + fmtSade(val) + ' TL');
    });

    const not = notEl.value.trim();
    const konu = encodeURIComponent('Mardin Kasa Defteri — ' + tarih);
    const govde = encodeURIComponent(
      'MARDİN ASPİLİÇ KASA DEFTERİ\n' +
      'Tarih: ' + tarih + '\n' +
      '─────────────────────────\n\n' +
      '▲ GELEN PARA\n' +
      (gelenKalemler.length ? gelenKalemler.join('\n') : '  —') + '\n' +
      'TOPLAM GELİR: ' + fmtSade(_gelen) + ' TL\n\n' +
      '▼ GİDEN PARA\n' +
      (gidenKalemler.length ? gidenKalemler.join('\n') : '  —') + '\n' +
      'TOPLAM GİDER: ' + fmtSade(_giden) + ' TL\n\n' +
      '─────────────────────────\n' +
      'KASADAKİ PARA: ' + fmtSade(_kalan) + ' TL\n' +
      (not ? '\nNOT: ' + not : '')
    );

    window.location.href = 'mailto:ertektavukculuk@hotmail.com?subject=' + konu + '&body=' + govde;
  }

  function yazdir() { window.print(); }

  hesapla();
</script>
</body>
</html>
